name: Publish Artifacts

permissions:
  actions: read
  contents: write

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  create-release:
    if: github.event.workflow_run.conclusion == 'success'
    name: Create Snapshot Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts from Build workflow
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          if command -v sha256sum &> /dev/null; then
            sha256sum gline-* > SHA256SUMS
          elif command -v shasum &> /dev/null; then
            shasum -a 256 gline-* > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Snapshot Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Snapshot ${{ steps.changelog.outputs.version }}"
          body: |
            ## Snapshot Build ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### macOS
            ```bash
            # Intel
            curl -L -o gline.zip https://github.com/${{ github.repository }}/releases/download/snapshot/gline-darwin-amd64.zip
            unzip gline.zip
            sudo mv gline.app /Applications/

            # Apple Silicon
            curl -L -o gline.zip https://github.com/${{ github.repository }}/releases/download/snapshot/gline-darwin-arm64.zip
            unzip gline.zip
            sudo mv gline.app /Applications/
            ```

            ### Linux
            ```bash
            # AMD64
            curl -L -o gline.tar.gz https://github.com/${{ github.repository }}/releases/download/snapshot/gline-linux-amd64.tar.gz
            tar -xzf gline.tar.gz
            sudo mv gline /usr/local/bin/

            # ARM64
            curl -L -o gline.tar.gz https://github.com/${{ github.repository }}/releases/download/snapshot/gline-linux-arm64.tar.gz
            tar -xzf gline.tar.gz
            sudo mv gline /usr/local/bin/
            ```

            ### Windows
            Download `gline-windows-amd64.zip` and extract `gline.exe` to your PATH.

            ## Checksums
            See `SHA256SUMS` file for checksums of all binaries.
          files: release/*
          draft: false
          prerelease: true
          tag_name: snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
