name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.25.0'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: darwin-arm64
            runner: macos-latest
            asset_name: gline-darwin-arm64
          # Linux AMD64 (needs Ubuntu 24.04 for GTK4/WebKitGTK-6.0)
          - name: linux-amd64
            runner: ubuntu-24.04
            asset_name: gline-linux-amd64
          # Windows AMD64
          - name: windows-amd64
            runner: windows-latest
            asset_name: gline-windows-amd64
          # NOTE: darwin-amd64 (Intel) and linux-arm64 excluded because free runners
          # are either deprecated (macos-13) or severely capacity-constrained.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config npm

      - name: Build with wails3
        shell: bash
        working-directory: gui
        run: wails3 build

      - name: Rename & generate checksum
        shell: bash
        run: |
          cd gui/bin
          if [[ "${{ matrix.name }}" == windows-* ]]; then
            mv gline.exe "${{ matrix.asset_name }}.exe"
            sha256sum "${{ matrix.asset_name }}.exe" > "${{ matrix.asset_name }}.sha256"
            cat "${{ matrix.asset_name }}.sha256"
          else
            mv gline "${{ matrix.asset_name }}"
            sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"
            cat "${{ matrix.asset_name }}.sha256"
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: gui/bin/${{ matrix.asset_name }}*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          # Copy all binaries (gline-* and gline-*.exe) along with their .sha256 files
          find artifacts -type f \( -name "gline-*" -o -name "gline-*.exe" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          ls -la
          # Generate aggregated SHA256SUMS
          if command -v sha256sum &> /dev/null; then
            sha256sum gline-darwin-* gline-linux-* gline-windows-* > SHA256SUMS
          elif command -v shasum &> /dev/null; then
            shasum -a 256 gline-darwin-* gline-linux-* gline-windows-* > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.changelog.outputs.version }}
          body: |
            ## Changes in ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### macOS (Apple Silicon)
            ```bash
            curl -L -o gline-darwin-arm64 https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-darwin-arm64
            chmod +x gline-darwin-arm64
            sudo mv gline-darwin-arm64 /usr/local/bin/gline
            ```
            > Note: Intel Macs are not supported in CI builds due to runner scarcity.
            > Apple Silicon users can use the arm64 binary.

            ### Linux
            ```bash
            curl -L -o gline-linux-amd64 https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-linux-amd64
            chmod +x gline-linux-amd64
            sudo mv gline-linux-amd64 /usr/local/bin/gline
            ```

            ### Windows
            Download `gline-windows-amd64.exe` and place it in your PATH.

            ## Checksums
            See `SHA256SUMS` file for checksums of all binaries.
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Release Summary
        run: |
          echo "## 🎉 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Binaries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | arm64       |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | amd64       |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | amd64       |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ darwin-amd64 and linux-arm64 excluded due to scarce free runners." >> $GITHUB_STEP_SUMMARY
          echo "📦 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
