name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.25.0'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-amd64
            runner: macos-13
          - name: darwin-arm64
            runner: macos-latest
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-latest
            arch: arm64
          - name: windows-amd64
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Build with wails3
        shell: bash
        working-directory: gui
        run: |
          wails3 build

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == darwin-* ]]; then
            APP_NAME="gline.app"
            BUNDLE="gline-${{ matrix.name }}.zip"
            (cd gui/bin && zip -r "../../../dist/$BUNDLE" "$APP_NAME")
            echo "package=$BUNDLE" >> $GITHUB_ENV
          elif [[ "${{ matrix.name }}" == windows-* ]]; then
            BINARY="gline.exe"
            PACKAGE="gline-${{ matrix.name }}.zip"
            (cd gui/bin && 7z a "../../../dist/$PACKAGE" "$BINARY")
            echo "package=$PACKAGE" >> $GITHUB_ENV
          else
            BINARY="gline"
            PACKAGE="gline-${{ matrix.name }}.tar.gz"
            (cd gui/bin && tar -czf "../../../dist/$PACKAGE" "$BINARY")
            echo "package=$PACKAGE" >> $GITHUB_ENV
          fi
          ls -la dist/

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "$package" > "$package.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$package" > "$package.sha256"
          fi
          cat "$package.sha256"
        env:
          package: ${{ env.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.name }}
          path: |
            dist/gline-*
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          if command -v sha256sum &> /dev/null; then
            sha256sum gline-* > SHA256SUMS
          elif command -v shasum &> /dev/null; then
            shasum -a 256 gline-* > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.changelog.outputs.version }}
          body: |
            ## Changes in ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### macOS
            ```bash
            # Intel
            curl -L -o gline.zip https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-darwin-amd64.zip
            unzip gline.zip
            # Move gline.app to /Applications
            sudo mv gline.app /Applications/

            # Apple Silicon
            curl -L -o gline.zip https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-darwin-arm64.zip
            unzip gline.zip
            sudo mv gline.app /Applications/
            ```

            ### Linux
            ```bash
            # AMD64
            curl -L -o gline.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-linux-amd64.tar.gz
            tar -xzf gline.tar.gz
            sudo mv gline /usr/local/bin/

            # ARM64
            curl -L -o gline.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-linux-arm64.tar.gz
            tar -xzf gline.tar.gz
            sudo mv gline /usr/local/bin/
            ```

            ### Windows
            Download `gline-windows-amd64.zip` and extract `gline.exe` to your PATH.

            ## Checksums
            See `SHA256SUMS` file for checksums of all binaries.
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Release Summary
        run: |
          echo "## 🎉 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Binaries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | amd64 |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | amd64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | amd64 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
