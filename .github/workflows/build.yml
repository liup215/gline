name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.0'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config npm

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Wails bindings
        shell: bash
        run: |
          cd cmd/gline
          wails3 generate bindings --ts -d "../../frontend/bindings"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm exec -- vite build --mode production

      - name: Sync frontend to embed dir
        shell: bash
        run: |
          mkdir -p cmd/gline/frontend/dist
          cp -r frontend/dist/* cmd/gline/frontend/dist/

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: darwin-arm64
            runner: macos-latest
          # Windows AMD64
          - name: windows-amd64
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Generate Wails bindings
        shell: bash
        run: |
          cd cmd/gline
          wails3 generate bindings --ts -d "../../frontend/bindings"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm exec -- vite build --mode production

      - name: Sync frontend to embed dir
        shell: bash
        run: |
          mkdir -p cmd/gline/frontend/dist
          cp -r frontend/dist/* cmd/gline/frontend/dist/

      - name: Build Go binary
        shell: bash
        run: |
          version=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          commit=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          build_time=$(date -u '+%Y-%m-%d_%H:%M:%S' 2>/dev/null || date)
          ldflags_base="-X github.com/liup215/gline/internal/version.Version=$version -X github.com/liup215/gline/internal/version.Commit=$commit -X github.com/liup215/gline/internal/version.BuildTime=$build_time -s -w"
          mkdir -p bin
          binary="bin/gline"
          if [[ "${{ matrix.name }}" == windows-* ]]; then
            GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${ldflags_base} -H=windowsgui" -o "${binary}.exe" ./cmd/gline
          else
            # macOS requires CGO for Wails WebKit bindings
            go build -ldflags "$ldflags_base" -o "$binary" ./cmd/gline
          fi

      - name: Rename & generate checksum
        shell: bash
        run: |
          asset_name="gline-${{ matrix.name }}"
          cd bin
          if [[ "${{ matrix.name }}" == windows-* ]]; then
            mv gline.exe "${asset_name}.exe"
            sha256sum "${asset_name}.exe" > "${asset_name}.sha256"
            cat "${asset_name}.sha256"
          else
            mv gline "$asset_name"
            sha256sum "$asset_name" > "${asset_name}.sha256"
            cat "${asset_name}.sha256"
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.name }}
          path: bin/gline-${{ matrix.name }}*
          if-no-files-found: error

  build-summary:
    name: Build Summary
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: List artifacts
        shell: bash
        run: |
          echo "Build artifacts:"
          find artifacts -type f | sort

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | ARM64       | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | AMD64       | ✅ |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "gline-*" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          ls -la
          if command -v sha256sum &> /dev/null; then
            sha256sum gline-darwin-* gline-windows-* > SHA256SUMS
          elif command -v shasum &> /dev/null; then
            shasum -a 256 gline-darwin-* gline-windows-* > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.changelog.outputs.version }}
          body: |
            ## Changes in ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### macOS (Apple Silicon)
            ```bash
            curl -L -o gline-darwin-arm64 https://github.com/${{ github.repository }}/releases/download/${{ steps.changelog.outputs.version }}/gline-darwin-arm64
            chmod +x gline-darwin-arm64
            sudo mv gline-darwin-arm64 /usr/local/bin/gline
            ```
            > Note: Intel Mac (amd64) users can build from source: `go build ./cmd/gline`

            ### Windows
            Download `gline-windows-amd64.exe` and place it in your PATH.

            ## Checksums
            See `SHA256SUMS` file for checksums of all binaries.
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snapshot:
    name: Create Snapshot Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "gline-*" -o -name "*.sha256" \) -exec cp {} release/ \;
          cd release
          ls -la
          if command -v sha256sum &> /dev/null; then
            sha256sum gline-darwin-* gline-windows-* > SHA256SUMS
          elif command -v shasum &> /dev/null; then
            shasum -a 256 gline-darwin-* gline-windows-* > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges "$PREVIOUS_TAG..HEAD")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Snapshot Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Snapshot ${{ steps.changelog.outputs.version }}"
          body: |
            ## Snapshot Build ${{ steps.changelog.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### macOS (Apple Silicon)
            ```bash
            curl -L -o gline-darwin-arm64 https://github.com/${{ github.repository }}/releases/download/snapshot/gline-darwin-arm64
            chmod +x gline-darwin-arm64
            sudo mv gline-darwin-arm64 /usr/local/bin/gline
            ```

            ### Windows
            Download `gline-windows-amd64.exe` and place it in your PATH.
          files: release/*
          draft: false
          prerelease: true
          tag_name: snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
