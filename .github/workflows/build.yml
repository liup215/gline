name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.24.4'
  NODE_VERSION: '20'

jobs:
  # 运行测试
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

  # 构建前端资源
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: gui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: gui/frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: gui/frontend/dist/

  # 构建所有平台
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # macOS
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''
          # Linux
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          # Windows
          - os: windows
            arch: amd64
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: gui/frontend/dist/

      - name: Get version info
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "COMMIT=$COMMIT" >> $GITHUB_OUTPUT
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (commit: $COMMIT)"

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="gline-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          LDFLAGS="-X github.com/liup215/gline/internal/version.Version=${{ steps.version.outputs.VERSION }} \
            -X github.com/liup215/gline/internal/version.Commit=${{ steps.version.outputs.COMMIT }} \
            -X github.com/liup215/gline/internal/version.BuildTime=${{ steps.version.outputs.BUILD_TIME }} \
            -s -w"
          cd gui && go build -ldflags "$LDFLAGS" -o "../bin/$OUTPUT" .
          echo "Built: bin/$OUTPUT"
          ls -la bin/

      - name: Package binary
        run: |
          mkdir -p dist
          BINARY="gline-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            (cd bin && zip "../dist/$BINARY.zip" "$BINARY")
            echo "PACKAGE=$BINARY.zip" >> $GITHUB_ENV
          else
            (cd bin && tar -czf "../dist/$BINARY.tar.gz" "$BINARY")
            echo "PACKAGE=$BINARY.tar.gz" >> $GITHUB_ENV
          fi
          ls -la dist/

      - name: Generate checksum
        run: |
          cd dist
          sha256sum "$PACKAGE" > "$PACKAGE.sha256"
          cat "$PACKAGE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/gline-*
          if-no-files-found: error

  # 汇总构建结果
  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: List artifacts
        run: |
          echo "Build artifacts:"
          find artifacts -type f -name "*" | sort

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | arm64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | arm64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
