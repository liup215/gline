name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.0'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — GitHub free tier freely available
          - name: darwin-arm64
            runner: macos-latest
          # Linux AMD64 (explicit 24.04 for webkitgtk-6.0)
          - name: linux-amd64
            runner: ubuntu-24.04
          # Windows AMD64
          - name: windows-amd64
            runner: windows-latest
          # NOTE: darwin-amd64 (Intel) and linux-arm64 removed from CI matrix
          # because macos-13 (Intel) runners are deprecated/scarce in free tier
          # and ubuntu-arm64 runners have limited availability.
          # Users needing Intel macOS or Linux ARM64 can build locally.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config npm
          echo "=== Installed GTK/WebKit packages ==="
          dpkg -l | grep -E 'libgtk|libwebkit'
          echo "=== pkg-config search path ==="
          pkg-config --variable pc_path pkg-config || true
          echo "=== pkg-config list (gtk/webkit) ==="
          pkg-config --list-all | grep -E 'gtk|webkit' || true
          echo "=== Testing pkg-config ==="
          pkg-config --cflags gtk4 || true
          pkg-config --cflags webkitgtk-6.0 || true

      - name: Build with wails3
        shell: bash
        working-directory: gui
        run: wails3 build

      - name: Upload binary (Unix)
        if: '!startsWith(matrix.name, ''windows'')'
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.name }}
          path: gui/bin/gline
          if-no-files-found: error

      - name: Upload binary (Windows)
        if: startsWith(matrix.name, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.name }}
          path: gui/bin/gline.exe
          if-no-files-found: error

  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: List artifacts
        shell: bash
        run: |
          echo "Build artifacts:"
          find artifacts -type f | sort

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | arm64       | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | amd64       | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | amd64       | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ darwin-amd64 and linux-arm64 excluded from CI matrix due to scarce free runners." >> $GITHUB_STEP_SUMMARY
