name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.0'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run vet
        run: go vet ./...

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-amd64
            runner: macos-13
          - name: darwin-arm64
            runner: macos-latest
          - name: linux-amd64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-latest
            arch: arm64
          - name: windows-amd64
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-go-

      - name: Install wails3 CLI
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build with wails3
        shell: bash
        working-directory: gui
        run: |
          wails3 build

      - name: Package artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.name }}" == darwin-* ]]; then
            # macOS produces .app bundle
            APP_NAME="gline.app"
            BUNDLE="gline-${{ matrix.name }}.zip"
            (cd gui/bin && zip -r "../../../dist/$BUNDLE" "$APP_NAME")
            echo "package=$BUNDLE" >> $GITHUB_ENV
          elif [[ "${{ matrix.name }}" == windows-* ]]; then
            # Windows produces .exe
            BINARY="gline.exe"
            PACKAGE="gline-${{ matrix.name }}.zip"
            (cd gui/build/bin && 7z a "../../../dist/$PACKAGE" "$BINARY")
            echo "package=$PACKAGE" >> $GITHUB_ENV
          else
            # Linux produces bare binary
            BINARY="gline"
            PACKAGE="gline-${{ matrix.name }}.tar.gz"
            (cd gui/build/bin && tar -czf "../../../dist/$PACKAGE" "$BINARY")
            echo "package=$PACKAGE" >> $GITHUB_ENV
          fi
          ls -la dist/

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &> /dev/null; then
            sha256sum "$package" > "$package.sha256"
          elif command -v shasum &> /dev/null; then
            shasum -a 256 "$package" > "$package.sha256"
          fi
          cat "$package.sha256"
        env:
          package: ${{ env.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gline-${{ matrix.name }}
          path: |
            dist/gline-*
            dist/*.sha256
          if-no-files-found: error

  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: gline-*

      - name: List artifacts
        run: |
          echo "Build artifacts:"
          find artifacts -type f | sort

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | arm64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | arm64 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | amd64 | ✅ |" >> $GITHUB_STEP_SUMMARY
